groups:
  - name: app-alerts
    rules:
      - alert: HighErrorRate
        expr: (sum(rate(http_errors_total[5m])) / sum(rate(http_requests_total[5m]))) * 100 > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for 5 minutes"

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum by (le, method, path) (rate(http_request_duration_seconds_bucket[5m]))) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected for {{ $labels.method }} {{ $labels.path }}"
          description: "The 95th percentile latency is above 200ms for 5 minutes on {{ $labels.method }} {{ $labels.path }}"
